<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - IT Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-wrapper {
            display: flex;
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.7);
            overflow: hidden;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-left {
            flex: 1;
            padding: 3.5rem 3rem;
            min-width: 320px;
        }

        .login-right {
            flex: 0 0 40%;
            background: linear-gradient(135deg, #1a2639 0%, #2c3e66 100%);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .login-right::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
        }

        .login-right .icon-big {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .login-right h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .login-right p {
            opacity: 0.7;
            font-size: 0.95rem;
            text-align: center;
            position: relative;
            z-index: 1;
            line-height: 1.6;
        }

        .login-right .decor-line {
            width: 60px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            margin: 1rem 0;
            position: relative;
            z-index: 1;
        }

        .login-header {
            margin-bottom: 2.5rem;
        }

        .login-header .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
        }

        .login-header .brand i {
            background: #1a2639;
            color: white;
            padding: 8px 10px;
            border-radius: 14px;
            font-size: 1.1rem;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            margin-top: 1.5rem;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: #475569;
            margin-bottom: 6px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .form-group .input-wrapper input {
            width: 100%;
            padding: 0.85rem 1.2rem 0.85rem 3rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            background: white;
            color: #0f172a;
        }

        .form-group .input-wrapper input:focus {
            border-color: #1a2639;
            box-shadow: 0 0 0 4px rgba(26, 38, 57, 0.06);
        }

        .form-group .input-wrapper input:focus + i,
        .form-group .input-wrapper input:focus ~ i {
            color: #1a2639;
        }

        .form-group .input-wrapper input::placeholder {
            color: #94a3b8;
        }

        .form-group .input-wrapper .toggle-password {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            transition: color 0.3s ease;
        }

        .form-group .input-wrapper .toggle-password:hover {
            color: #475569;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 10px;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .error-message.show {
            display: flex;
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 16px;
            background: #1a2639;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 0.5rem;
            height: 54px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-login:hover::after {
            opacity: 1;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(26, 38, 57, 0.25);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login i {
            color: #a0c0ff;
        }

        .loading-spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .login-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .login-footer a {
            color: #1a2639;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                border-radius: 30px;
                max-width: 420px;
            }

            .login-left {
                padding: 2.5rem 1.8rem;
                min-width: unset;
            }

            .login-right {
                flex: none;
                padding: 2rem 1.8rem;
                border-radius: 0 0 30px 30px;
            }

            .login-right .icon-big {
                font-size: 3rem;
                margin-bottom: 0.8rem;
            }

            .login-right h2 {
                font-size: 1.4rem;
            }

            .login-right p {
                font-size: 0.85rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 400px) {
            .login-left {
                padding: 2rem 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Side: Form -->
        <div class="login-left">
            <div class="login-header">
                <div class="brand">
                    <i class="fas fa-server"></i>
                    <span>IT Inventory</span>
                </div>
                <h1>Selamat Datang</h1>
                <p>Masuk untuk mengelola inventaris</p>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Error message</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope" style="margin-right:6px;"></i> Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="emailInput" 
                            placeholder="Masukkan email" 
                            required 
                            autocomplete="email"
                            autofocus
                        />
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock" style="margin-right:6px;"></i> Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="passwordInput" 
                            placeholder="Masukkan password" 
                            required 
                            autocomplete="current-password"
                        />
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span id="loginBtnText">Masuk</span>
                </button>
            </form>

            <div class="login-footer">
                <span>Belum punya akun? </span>
                <a id="registerLink">Hubungi Admin untuk daftar</a>
            </div>
        </div>

        <!-- Right Side: Branding -->
        <div class="login-right">
            <div class="icon-big">
                <i class="fas fa-boxes"></i>
            </div>
            <h2>IT Inventory Manager</h2>
            <div class="decor-line"></div>
            <p>Kelola inventaris IT dengan mudah<br />dan efisien dalam satu platform</p>
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAtZe_Zo4EYD3QUe2aIveHnawRb3GXsVJM",
            authDomain: "panduan-genetek.firebaseapp.com",
            projectId: "panduan-genetek",
            storageBucket: "panduan-genetek.firebasestorage.app",
            messagingSenderId: "654454090409",
            appId: "1:654454090409:web:d1c4bc92b9be50218c57b8"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ==================== DOM ELEMENTS ====================
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const togglePassword = document.getElementById('togglePassword');
        const registerLink = document.getElementById('registerLink');

        // ==================== HELPERS ====================
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        function setLoading(loading) {
            if (loading) {
                loginBtn.disabled = true;
                loginBtnText.innerHTML = '<span class="loading-spinner"></span> Memproses...';
            } else {
                loginBtn.disabled = false;
                loginBtnText.textContent = 'Masuk';
            }
        }

        // ==================== TOGGLE PASSWORD ====================
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // ==================== LOGIN WITH FIREBASE AUTH ====================
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Email dan password wajib diisi.');
                return;
            }

            setLoading(true);

            try {
                // Login menggunakan Firebase Authentication
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // Ambil data user dari Firestore (opsional)
                let userData = {};
                try {
                    const docRef = await db.collection('users').doc(user.uid).get();
                    if (docRef.exists) {
                        userData = docRef.data();
                    }
                } catch (e) {
                    console.log('User data tidak ditemukan di Firestore');
                }

                // Simpan session
                const sessionUser = {
                    id: user.uid,
                    email: user.email,
                    displayName: user.displayName || userData.username || user.email?.split('@')[0] || 'User',
                    username: userData.username || user.email?.split('@')[0] || 'User',
                    role: userData.role || 'user'
                };
                
                localStorage.setItem('itUser', JSON.stringify(sessionUser));
                
                // Redirect ke halaman utama
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('Login error:', error);
                
                let message = 'Terjadi kesalahan. Silakan coba lagi.';
                switch (error.code) {
                    case 'auth/user-not-found':
                        message = 'Email tidak terdaftar. Silakan hubungi admin.';
                        break;
                    case 'auth/wrong-password':
                        message = 'Password salah. Silakan coba lagi.';
                        break;
                    case 'auth/invalid-email':
                        message = 'Format email tidak valid.';
                        break;
                    case 'auth/too-many-requests':
                        message = 'Terlalu banyak percobaan. Coba lagi nanti.';
                        break;
                    case 'auth/network-request-failed':
                        message = 'Koneksi internet bermasalah. Periksa koneksi Anda.';
                        break;
                    default:
                        message = error.message;
                }
                showError(message);
                setLoading(false);
            }
        });

        // ==================== REGISTER LINK ====================
        registerLink.addEventListener('click', function(e) {
            e.preventDefault();
            alert('Untuk mendaftar, silakan hubungi admin IT.\n\nAtau gunakan console untuk register user baru.');
            
            console.log('=== CARA REGISTER USER BARU ===');
            console.log('1. Buka Firebase Console');
            console.log('2. Pilih Authentication');
            console.log('3. Klik "Add User"');
            console.log('4. Masukkan email dan password');
            console.log('5. Klik "Add User"');
            console.log('');
            console.log('Atau gunakan script di console:');
            console.log(`
// Register user via Firebase Auth
async function registerUser(email, password, username = '') {
    try {
        const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        // Update profile
        if (username) {
            await user.updateProfile({ displayName: username });
        }
        
        // Simpan ke Firestore
        await firebase.firestore().collection('users').doc(user.uid).set({
            username: username || email.split('@')[0],
            email: email,
            role: 'user',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        console.log('✅ User berhasil didaftarkan!');
        console.log('📧 Email:', email);
        console.log('👤 Username:', username || email.split('@')[0]);
        return true;
    } catch (error) {
        console.error('❌ Gagal register:', error);
        return false;
    }
}

// Contoh penggunaan:
registerUser('admin@domain.com', 'admin123', 'admin');
registerUser('budi@domain.com', 'budi123', 'budi');
            `);
        });

        // ==================== KEYBOARD SHORTCUT ====================
        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });

        // ==================== AUTO REDIRECT ====================
        auth.onAuthStateChanged(function(user) {
            if (user) {
                // Already logged in, redirect to main page
                window.location.href = 'index.html';
            }
        });

        // ==================== FOCUS ====================
        setTimeout(() => {
            emailInput.focus();
        }, 300);
    </script>
</body>
</html>
